<header style="background-color:#fff;border-bottom:1px solid #d0d7de;padding:0 16px">
  <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;height:60px;gap:24px">
    <a href="/search" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:#24292f;font-weight:600;font-size:16px">
      <svg height="24" viewBox="0 0 16 16" fill="#24292f">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      ProfessorTracker
    </a>
    <nav style="display:flex;gap:8px;flex:1">
      <a href="/search" id="nav-search" style="padding:6px 12px;border-radius:6px;text-decoration:none;font-size:14px;font-weight:500">Search Professors</a>
      <a href="/list" id="nav-list" style="padding:6px 12px;border-radius:6px;text-decoration:none;font-size:14px;font-weight:500">My List</a>
    </nav>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="color:#57606a;font-size:14px">{{ user_email }}</span>
      <a href="/auth/logout" style="padding:5px 12px;background-color:transparent;border:1px solid #d0d7de;border-radius:6px;color:#24292f;font-size:14px;text-decoration:none">Sign out</a>
    </div>
  </div>
</header>
<script>
  (function() {
    var path = window.location.pathname;
    var searchLink = document.getElementById('nav-search');
    var listLink = document.getElementById('nav-list');
    if (path === '/search') {
      searchLink.style.color = '#24292f';
      searchLink.style.backgroundColor = '#eaeef2';
    } else {
      searchLink.style.color = '#57606a';
    }
    if (path === '/list') {
      listLink.style.color = '#24292f';
      listLink.style.backgroundColor = '#eaeef2';
    } else {
      listLink.style.color = '#57606a';
    }
  })();
</script>
