{% extends "base.html" %}

{% block navbar %}{% include "navbar.html" %}{% endblock %}

{% block content %}
<div style="background-color:#fff;min-height:100vh">
  <main style="max-width:1280px;margin:0 auto;padding:32px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h1 style="color:#24292f;font-size:24px;font-weight:600;margin:0">
        My Professors
        <span id="total-badge" style="margin-left:12px;background-color:#f6f8fa;border:1px solid #d0d7de;border-radius:20px;padding:2px 10px;font-size:14px;color:#57606a;font-weight:400">0</span>
      </h1>
      <select id="filter-status" onchange="applyFilter()" style="padding:6px 12px;background-color:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;color:#24292f;font-size:14px">
        <option value="">All Statuses</option>
        <option value="NOT_CONTACTED">Not Contacted</option>
        <option value="EMAILED">Emailed</option>
        <option value="ANSWERED">Answered</option>
        <option value="REJECTED">Rejected</option>
        <option value="PENDING">Pending</option>
      </select>
    </div>

    <div id="loading" style="text-align:center;padding:48px;color:#57606a">Loading...</div>

    <div id="empty-state" style="display:none;text-align:center;padding:64px 16px;background-color:#f6f8fa;border:1px solid #d0d7de;border-radius:6px">
      <p style="color:#57606a;font-size:16px" id="empty-msg">You haven't added any professors yet.</p>
      <button onclick="window.location.href='/search'" id="go-search-btn" style="padding:8px 20px;background-color:#1a7f37;border:1px solid rgba(27,31,36,0.15);border-radius:6px;color:#fff;font-size:14px;font-weight:600">Search Professors</button>
    </div>

    <div id="table-container" style="display:none;background-color:#fff;border:1px solid #d0d7de;border-radius:6px;overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="border-bottom:1px solid #d0d7de;background-color:#f6f8fa">
            <th style="padding:12px 16px;text-align:left;color:#57606a;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Professor</th>
            <th style="padding:12px 16px;text-align:left;color:#57606a;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">University</th>
            <th style="padding:12px 16px;text-align:left;color:#57606a;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Department</th>
            <th style="padding:12px 16px;text-align:left;color:#57606a;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Email</th>
            <th style="padding:12px 16px;text-align:left;color:#57606a;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Status</th>
            <th style="padding:12px 16px;text-align:left;color:#57606a;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Notes</th>
            <th style="padding:12px 16px"></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </main>
</div>
{% endblock %}

{% block scripts %}
<script>
  const STATUS_STYLES = {
    NOT_CONTACTED: {bg:'#f6f8fa', color:'#57606a', border:'#d0d7de', label:'Not Contacted'},
    EMAILED:       {bg:'#ddf4ff', color:'#0969da', border:'#54aeff', label:'Emailed'},
    ANSWERED:      {bg:'#dafbe1', color:'#1a7f37', border:'#2da44e', label:'Answered'},
    REJECTED:      {bg:'#ffebe9', color:'#d1242f', border:'#ff8182', label:'Rejected'},
    PENDING:       {bg:'#fff8c5', color:'#9a6700', border:'#d4a72c', label:'Pending'},
  };
  const STATUS_OPTIONS = Object.keys(STATUS_STYLES);

  let allTracked = [];

  async function load() {
    const res = await fetch('/api/tracked');
    document.getElementById('loading').style.display = 'none';
    if (!res.ok) return;
    allTracked = await res.json();
    render();
  }

  function applyFilter() {
    render();
  }

  function render() {
    const filter = document.getElementById('filter-status').value;
    const filtered = filter ? allTracked.filter(t => t.status === filter) : allTracked;

    document.getElementById('total-badge').textContent = allTracked.length;

    if (filtered.length === 0) {
      document.getElementById('table-container').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
      if (allTracked.length === 0) {
        document.getElementById('empty-msg').textContent = "You haven't added any professors yet.";
        document.getElementById('go-search-btn').style.display = 'inline-block';
      } else {
        document.getElementById('empty-msg').textContent = 'No professors match the selected filter.';
        document.getElementById('go-search-btn').style.display = 'none';
      }
      return;
    }

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('table-container').style.display = 'block';

    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    filtered.forEach((item, idx) => {
      tbody.appendChild(buildRow(item, idx));
    });
  }

  function buildRow(item, idx) {
    const style = STATUS_STYLES[item.status] || STATUS_STYLES.NOT_CONTACTED;
    const tr = document.createElement('tr');
    tr.id = 'row-' + item.id;
    tr.style.cssText = 'border-bottom:1px solid #eaeef2;background-color:' + (idx % 2 === 0 ? 'transparent' : '#f6f8fa');

    const statusOptions = STATUS_OPTIONS.map(s =>
      `<option value="${s}" ${s === item.status ? 'selected' : ''}>${STATUS_STYLES[s].label}</option>`
    ).join('');

    tr.innerHTML = `
      <td style="padding:12px 16px"><span style="color:#24292f;font-size:14px;font-weight:500">${item.professor.name}</span></td>
      <td style="padding:12px 16px;color:#57606a;font-size:14px">${item.professor.university}</td>
      <td style="padding:12px 16px;color:#57606a;font-size:14px">${item.professor.department}</td>
      <td style="padding:12px 16px">${item.professor.email ? `<a href="mailto:${item.professor.email}" style="color:#0969da;font-size:14px;text-decoration:none">${item.professor.email}</a>` : '<span style="color:#8c959f;font-size:14px">No public email</span>'}</td>
      <td style="padding:12px 16px">
        <select onchange="updateStatus('${item.id}', this.value, this)"
          style="padding:4px 8px;background-color:${style.bg};border:1px solid ${style.border};border-radius:20px;color:${style.color};font-size:12px;font-weight:500">
          ${statusOptions}
        </select>
      </td>
      <td style="padding:12px 16px;min-width:200px" id="notes-cell-${item.id}">
        <span onclick="editNotes('${item.id}', \`${(item.notes||'').replace(/`/g,'\\`')}\`)"
          style="color:${item.notes ? '#24292f' : '#8c959f'};font-size:13px;cursor:pointer;display:block;padding:4px;border-radius:4px"
          title="Click to edit">
          ${item.notes || 'Add notes...'}
        </span>
      </td>
      <td style="padding:12px 16px">
        <button onclick="removeFromList('${item.id}')"
          style="padding:4px 10px;background-color:transparent;border:1px solid #ff8182;border-radius:6px;color:#d1242f;font-size:12px">
          Remove
        </button>
      </td>
    `;
    return tr;
  }

  async function updateStatus(id, newStatus, selectEl) {
    const style = STATUS_STYLES[newStatus] || STATUS_STYLES.NOT_CONTACTED;
    selectEl.style.backgroundColor = style.bg;
    selectEl.style.borderColor = style.border;
    selectEl.style.color = style.color;

    await fetch('/api/tracked', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id, status: newStatus})
    });
    const item = allTracked.find(t => t.id === id);
    if (item) item.status = newStatus;
  }

  function editNotes(id, current) {
    const cell = document.getElementById('notes-cell-' + id);
    cell.innerHTML = `
      <div style="display:flex;gap:6px">
        <input type="text" id="notes-input-${id}" value="${current.replace(/"/g,'&quot;')}"
          onkeydown="notesKey(event,'${id}')"
          autofocus
          style="flex:1;padding:4px 8px;background-color:#fff;border:1px solid #d0d7de;border-radius:6px;color:#24292f;font-size:13px" />
        <button onclick="saveNotes('${id}')" style="padding:4px 8px;background-color:#1a7f37;border:1px solid rgba(27,31,36,0.15);border-radius:6px;color:#fff;font-size:12px">Save</button>
        <button onclick="cancelNotes('${id}')" style="padding:4px 8px;background-color:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;color:#57606a;font-size:12px">✕</button>
      </div>
    `;
    document.getElementById('notes-input-' + id).focus();
  }

  function notesKey(e, id) {
    if (e.key === 'Enter') saveNotes(id);
    if (e.key === 'Escape') cancelNotes(id);
  }

  async function saveNotes(id) {
    const notes = document.getElementById('notes-input-' + id).value;
    const res = await fetch('/api/tracked', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id, notes})
    });
    if (res.ok) {
      const item = allTracked.find(t => t.id === id);
      if (item) item.notes = notes;
      const cell = document.getElementById('notes-cell-' + id);
      cell.innerHTML = `<span onclick="editNotes('${id}', \`${notes.replace(/`/g,'\\`')}\`)"
        style="color:${notes ? '#24292f' : '#8c959f'};font-size:13px;cursor:pointer;display:block;padding:4px;border-radius:4px"
        title="Click to edit">${notes || 'Add notes...'}</span>`;
    }
  }

  async function cancelNotes(id) {
    const item = allTracked.find(t => t.id === id);
    const notes = item ? item.notes : '';
    const cell = document.getElementById('notes-cell-' + id);
    cell.innerHTML = `<span onclick="editNotes('${id}', \`${(notes||'').replace(/`/g,'\\`')}\`)"
      style="color:${notes ? '#24292f' : '#8c959f'};font-size:13px;cursor:pointer;display:block;padding:4px;border-radius:4px"
      title="Click to edit">${notes || 'Add notes...'}</span>`;
  }

  async function removeFromList(id) {
    const res = await fetch('/api/tracked', {
      method: 'DELETE',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id})
    });
    if (res.ok) {
      allTracked = allTracked.filter(t => t.id !== id);
      render();
    }
  }

  load();
</script>
{% endblock %}
